services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: kora123
      MYSQL_DATABASE: kora
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  kora:
    build: .
    ports:
      - "8000:8000"
    environment:
      - KORA_DB_TYPE=mysql
      - DB_DSN=root:kora123@tcp(mysql:3306)/kora?parseTime=true
      - CONSOLE_EMAIL=admin@kora.local
      - CONSOLE_PASSWORD=kora123
      - KORA_DB_USER=root
      - KORA_DB_PASSWORD=kora123
    depends_on:
      mysql:
        condition: service_healthy
