name: Supplier
module: Purchasing
title_field: company_name
search_fields: company_name, email
sort_field: modified
sort_order: DESC
fields:
  - fieldname: company_name
    fieldtype: Data
    label: Company Name
    reqd: true
    bold: true
    in_list_view: true
    search_index: true
  - fieldname: contact_person
    fieldtype: Data
    label: Contact Person
  - fieldname: email
    fieldtype: Data
    label: Email
    options: Email
  - fieldname: phone
    fieldtype: Data
    label: Phone
    options: Phone
  - fieldname: address
    fieldtype: Text
    label: Address
  - fieldname: category
    fieldtype: Select
    label: Category
    options: |
      Raw Materials
      Services
      Equipment
      Software
      Logistics
      Other
    in_list_view: true
  - fieldname: payment_terms
    fieldtype: Data
    label: Payment Terms
    default: Net 30
  - fieldname: status
    fieldtype: Select
    label: Status
    options: |
      Active
      Inactive
      Blacklisted
    default: Active
