name: Account
module: Finance
title_field: account_name
search_fields: account_name, account_number, account_type
sort_field: account_number
sort_order: ASC
fields:
  - fieldname: account_name
    fieldtype: Data
    label: Account Name
    reqd: true
    bold: true
    in_list_view: true
    search_index: true
  - fieldname: account_number
    fieldtype: Data
    label: Account Number
    reqd: true
    unique: true
    in_list_view: true
  - fieldname: account_type
    fieldtype: Select
    label: Account Type
    options: |
      Asset
      Liability
      Equity
      Income
      Expense
    reqd: true
    in_list_view: true
    in_standard_filter: true
  - fieldname: parent_account
    fieldtype: Link
    label: Parent Account
    options: Account
  - fieldname: is_group
    fieldtype: Check
    label: Is Group
  - fieldname: opening_balance
    fieldtype: Currency
    label: Opening Balance
    default: "0"
  - fieldname: current_balance
    fieldtype: Currency
    label: Current Balance
    computed: opening_balance
    read_only: true
  - fieldname: description
    fieldtype: Text
    label: Description
