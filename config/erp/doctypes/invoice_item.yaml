    label: Due Date
    reqd: true
  - fieldname: total_amount
    fieldtype: Currency
    label: Total Amount
    computed: SUM(items.line_total)
    read_only: true
    in_list_view: true
  - fieldname: tax_amount
    fieldtype: Currency
    label: Tax
  - fieldname: grand_total
    fieldtype: Currency
    label: Grand Total
    computed: total_amount + tax_amount
    read_only: true
    in_list_view: true
  - fieldname: payment_status
    fieldtype: Select
    label: Payment Status
    options: |
      Unpaid
      Partially Paid
      Paid
      Overdue
    default: Unpaid
    in_list_view: true
    in_standard_filter: true
  - fieldname: items
    fieldtype: Table
    label: Invoice Items
    options: Invoice Item
  - fieldname: status
    fieldtype: Data
    label: Status
    default: Draft
    read_only: true

---
name: Invoice Item
module: Sales
is_child_table: true
fields:
  - fieldname: item
    fieldtype: Link
    label: Item
    options: Item
    reqd: true
    in_list_view: true
  - fieldname: quantity
    fieldtype: Int
    label: Quantity
